name: Self-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install
        run: composer install --no-interaction --quiet

      - name: Syntax-check sources
        run: |
          set -e
          find src bin -type f \( -name '*.php' -o -name 'maho-module-gen' \) -print0 \
            | xargs -0 -n1 php -l > /dev/null
          echo "sources OK"

      - name: Generate the example spec
        run: |
          php bin/maho-module-gen generate specs/example-testimonials.yaml --out /tmp/gen

      - name: Syntax-check generated PHP
        run: |
          set -e
          find /tmp/gen -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null
          echo "generated PHP OK"

      - name: Validate generated XML
        run: |
          set -e
          sudo apt-get install -y -q libxml2-utils > /dev/null
          find /tmp/gen -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout
          echo "generated XML OK"

      - name: Dogfood - the generated module must pass its own linter
        run: php bin/maho-module-gen lint /tmp/gen

      - name: Delta mode - regenerate --into must add 0 files and exit 0
        run: |
          set -e
          out=$(php bin/maho-module-gen generate specs/example-testimonials.yaml --into /tmp/gen)
          echo "$out" | grep -q "0 file(s) added" || { echo "delta re-run wrote files!"; exit 1; }
          echo "delta OK"

      - name: Delta mode - --into refuses a non-module dir
        run: |
          mkdir -p /tmp/notamodule
          if php bin/maho-module-gen generate specs/example-testimonials.yaml --into /tmp/notamodule; then
            echo "guard failed - accepted a non-module dir"; exit 1
          fi
          echo "guard OK"

      - name: Audit - pristine module is all-identical (exit 0)
        run: php bin/maho-module-gen audit specs/example-testimonials.yaml /tmp/gen

      - name: Audit - missing file fails, drift is informational unless opted in
        run: |
          set -e
          echo "// hand edit" >> /tmp/gen/README.md
          rm /tmp/gen/.gitignore
          if php bin/maho-module-gen audit specs/example-testimonials.yaml /tmp/gen --no-diff; then
            echo "audit should fail on a missing file"; exit 1
          fi
          # restore the missing file; drifted README remains
          php bin/maho-module-gen generate specs/example-testimonials.yaml --into /tmp/gen > /dev/null
          php bin/maho-module-gen audit specs/example-testimonials.yaml /tmp/gen --no-diff   # drift alone: exit 0
          if php bin/maho-module-gen audit specs/example-testimonials.yaml /tmp/gen --no-diff --fail-on-drift; then
            echo "--fail-on-drift should have failed"; exit 1
          fi
          echo "audit exit-code matrix OK"

      - name: M1 clean-room round-trip - extract fixture, spec must parse + generate + self-lint
        run: |
          set -e
          php bin/maho-module-gen extract tests/fixtures/m1-sample --out /tmp/extracted.yaml
          php bin/maho-module-gen generate /tmp/extracted.yaml --out /tmp/roundtrip
          find /tmp/roundtrip -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null
          php bin/maho-module-gen lint /tmp/roundtrip
          echo "clean-room round-trip OK"
